<!DOCTYPE html>
<html>

<head>
  <style>
    /* unvisited link */
    a:link {
      color: red;
    }

    a:hover {
      color: hotpink;
      font-size: 30px;
      text-decoration: underline;

    }

    /* or input { width: 300px;
      padding: 10px 15px;
      font-size: 16px; etc} */
    .styled-input {
      width: 300px;
      padding: 10px 15px;
      font-size: 16px;
      border: 2px solid #12a80d;
      border-radius: 5px;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
  </style>
</head>

<body>
  <h2>Codingal</h2>
  <a href="https://google.com/"> Click Me</a>
  <input type="text" placeholder="Enter your name" class="styled-input">
</body>

</html>
