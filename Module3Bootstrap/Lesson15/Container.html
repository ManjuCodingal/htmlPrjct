<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- The initial-scale=1 is part of the viewport meta tag in HTML, which is used to control how the webpage is displayed on
  different devices, especially on mobile devices. 
  initial-scale=1: This part sets the initial zoom level of the page to 100%, which means the page will not be zoomed in or out when it loads. 1 represents the default scale, which means it will render at the natural size without any zooming.-->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <title>container</title>
</head>

<body>
  <div class="container bg-success text-white">
    <h1>My First Bootstrap Page</h1>
    <p>This part is inside a .container class.</p>
    <p>The .container class provides a responsive fixed width container.</p>
  </div>
</body>

</html>
